name: CI/CD - Student Management System

on:
  push:
    branches: [ "main" ]
    paths:
      - "Student Management System/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "Student Management System/**"

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Student Management System"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest || echo "No tests yet"

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Student Management System"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy step
        run: echo "Deploying Student Management System..."